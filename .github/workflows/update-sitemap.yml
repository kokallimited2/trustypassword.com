name: Update Sitemap
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate sitemap.xml
        run: |
          DOMAIN="https://trustypassword.com"
          DATE=$(date +%Y-%m-%d)
          cat > sitemap.xml << SEOF
<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  <url><loc>${DOMAIN}/</loc><lastmod>${DATE}</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>
  <url><loc>${DOMAIN}/blog.html</loc><lastmod>${DATE}</lastmod><changefreq>weekly</changefreq><priority>0.9</priority></url>
  <url><loc>${DOMAIN}/about.html</loc><lastmod>${DATE}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>
SEOF
          for f in blog/*.html; do
            slug=$(basename "$f")
            echo "  <url><loc>${DOMAIN}/blog/${slug}</loc><lastmod>${DATE}</lastmod><changefreq>monthly</changefreq><priority>0.8</priority></url>" >> sitemap.xml
          done
          echo "</urlset>" >> sitemap.xml
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: auto-update sitemap [skip ci]"
          git push
